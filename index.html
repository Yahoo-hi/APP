<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Luyện Phát Âm Tiếng Trung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-r from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
<H1>NGUYỄN TRẦN MỸ TIÊN</H1>
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-md w-full text-center border border-gray-100">
        <h1 class="text-2xl font-bold text-indigo-600 mb-2">Học tiếng Trung nha 🇨🇳</h1>
        <p class="text-gray-500 text-sm mb-6">Luyện phát âm tiếng Trung chuẩn cùng AI</p>

        <div class="bg-indigo-50 rounded-xl p-6 mb-6 relative overflow-hidden">
            <span class="absolute top-2 right-3 text-xs font-semibold text-indigo-400 uppercase tracking-wider">Từ vựng</span>
            <div id="hanzi" class="text-5xl font-bold text-gray-800 mb-2">你好</div>
            <div id="pinyin" class="text-xl text-indigo-500 font-medium mb-1">nǐ hǎo</div>
            <div id="meaning" class="text-gray-600 text-sm italic">Xin chào</div>
        </div>

        <button onclick="speakTarget()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition duration-200 mb-4 flex items-center justify-center gap-2">
            <i class="fas fa-volume-up"></i> Nghe phát âm mẫu
        </button>

        <hr class="my-6 border-gray-200">

        <div class="mb-6">
            <p class="text-sm font-medium text-gray-700 mb-3">Nhấn giữ hoặc bấm để nói:</p>
            <button id="micBtn" onclick="toggleRecognition()" class="w-20 h-20 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white text-3xl shadow-lg transition-all duration-300 focus:outline-none flex items-center justify-center mx-auto">
                <i id="micIcon" class="fas fa-microphone"></i>
            </button>
            <div id="status" class="text-xs text-gray-400 mt-2 font-medium">Sẵn sàng</div>
        </div>

        <div id="resultArea" class="hidden bg-gray-50 rounded-xl p-4 border border-gray-200 text-left">
            <p class="text-xs text-gray-400 font-semibold uppercase mb-1">Kết quả của bạn:</p>
            <div class="flex items-center justify-between">
                <div>
                    <p id="userSpeech" class="text-lg font-bold text-gray-700">-</p>
                    <p id="feedbackText" class="text-sm font-medium mt-1"></p>
                </div>
                <div id="resultIcon" class="text-2xl"></div>
            </div>
        </div>

        <button onclick="nextWord()" class="mt-6 text-sm text-indigo-600 hover:text-indigo-800 font-semibold flex items-center justify-center gap-1 mx-auto transition">
            Đổi từ khác <i class="fas fa-arrow-right text-xs"></i>
        </button>
    </div>

    <script>
        // Danh sách từ vựng mẫu (Bạn có thể mở rộng danh sách này thoải mái)
        const wordList = [
            { hanzi: "你好", pinyin: "nǐ hǎo", meaning: "Xin chào" },
            { hanzi: "谢谢", pinyin: "xièxie", meaning: "Cảm ơn" },
            { hanzi: "再见", pinyin: "zàijiàn", meaning: "Tạm biệt" },
            { hanzi: "我爱你", pinyin: "wǒ ài nǐ", meaning: "Tôi yêu bạn" },
            { hanzi: "中国", pinyin: "Zhōngguó", meaning: "Trung Quốc" },
            { hanzi: "学习", pinyin: "xuéxí", meaning: "Học tập" },
            { hanzi: "苹果", pinyin: "píngguǒ", meaning: "Quả táo" },
            { hanzi: "漂亮", pinyin: "piàoliang", meaning: "Xinh đẹp" }
        ];

        let currentIndex = 0;
        let recognition;
        let isListening = false;

        // Khởi tạo Speech Recognition (Nhận diện giọng nói)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN'; // Cấu hình nhận diện tiếng Trung (Giản thể)
            recognition.interimResults = false; // Chỉ lấy kết quả cuối cùng
            recognition.maxAlternatives = 1;

            // Khi bắt đầu nói
            recognition.onstart = () => {
                isListening = true;
                setMicState(true);
            };

            // Khi kết thúc nói
            recognition.onend = () => {
                isListening = false;
                setMicState(false);
            };

            // Trả về kết quả sau khi nhận diện xong
            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                checkPronunciation(speechResult);
            };

            recognition.onerror = (event) => {
                console.error("Lỗi nhận diện:", event.error);
                document.getElementById('status').innerText = "Không nghe rõ, vui lòng thử lại!";
                setMicState(false);
            };
        } else {
            alert("Trình duyệt của bạn không hỗ trợ Web Speech API. Hãy dùng Google Chrome hoặc Microsoft Edge mới nhất.");
        }

        // Hàm phát âm mẫu (Text-to-Speech)
        function speakTarget() {
            const currentWord = wordList[currentIndex].hanzi;
            const utterance = new SpeechSynthesisUtterance(currentWord);
            utterance.lang = 'zh-CN'; // Đọc bằng tiếng Trung
            window.speechSynthesis.speak(utterance);
        }

        // Bật/Tắt mic
        function toggleRecognition() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                document.getElementById('status').innerText = "Đang lắng nghe...";
                recognition.start();
            }
        }

        // Thay đổi UI của nút Mic
        function setMicState(listening) {
            const micBtn = document.getElementById('micBtn');
            const micIcon = document.getElementById('micIcon');
            const status = document.getElementById('status');

            if (listening) {
                micBtn.classList.remove('bg-emerald-500', 'hover:bg-emerald-600');
                micBtn.classList.add('bg-red-500', 'hover:bg-red-600', 'animate-pulse');
                micIcon.className = "fas fa-stop";
            } else {
                micBtn.classList.remove('bg-red-500', 'hover:bg-red-600', 'animate-pulse');
                micBtn.classList.add('bg-emerald-500', 'hover:bg-emerald-600');
                micIcon.className = "fas fa-microphone";
                status.innerText = "Sẵn sàng";
            }
        }

        // So sánh kết quả phát âm
        function checkPronunciation(userText) {
            const targetText = wordList[currentIndex].hanzi;
            const resultArea = document.getElementById('resultArea');
            const userSpeech = document.getElementById('userSpeech');
            const feedbackText = document.getElementById('feedbackText');
            const resultIcon = document.getElementById('resultIcon');

            resultArea.classList.remove('hidden');
            userSpeech.innerText = userText;

            // Loại bỏ dấu câu cơ bản nếu có để so sánh chính xác hơn
            const cleanUser = userText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()？。，！]/g,"");
            const cleanTarget = targetText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()？。，！]/g,"");

            if (cleanUser === cleanTarget) {
                feedbackText.innerText = "Tuyệt vời! Phát âm chuẩn xác.";
                feedbackText.className = "text-sm font-medium mt-1 text-emerald-600";
                resultIcon.innerHTML = "🏆";
            } else {
                feedbackText.innerText = "Chưa chính xác, thử lại xem nhé!";
                feedbackText.className = "text-sm font-medium mt-1 text-red-500";
                resultIcon.innerHTML = "❌";
            }
        }

        // Chuyển sang từ tiếp theo
        function nextWord() {
            currentIndex = (currentIndex + 1) % wordList.length;
            document.getElementById('hanzi').innerText = wordList[currentIndex].hanzi;
            document.getElementById('pinyin').innerText = wordList[currentIndex].pinyin;
            document.getElementById('meaning').innerText = wordList[currentIndex].meaning;
            
            // Ẩn vùng kết quả cũ
            document.getElementById('resultArea').classList.add('hidden');
        }
    </script>
</body>
</html>
